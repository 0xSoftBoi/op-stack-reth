global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'op-reth'
    static_configs:
      - targets: ['op-reth:9001']
    metrics_path: /metrics

  - job_name: 'op-node'
    static_configs:
      - targets: ['op-node:9003']

  - job_name: 'op-batcher'
    static_configs:
      - targets: ['op-batcher:9004']

  - job_name: 'op-proposer'
    static_configs:
      - targets: ['op-proposer:9005']
